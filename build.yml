name: Build CryptoHash

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:

  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xfixes0 libxcb-shape0 libxkbcommon-x11-0 \
            libdbus-1-3 libxrender1 libxi6 libxtst6

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install PyQt5 pyinstaller watchdog

      - name: Build Linux binary
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "CryptoHash" \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import hashlib \
            --hidden-import hmac \
            --hidden-import zlib \
            hash_generator.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoHash-Linux
          path: dist/CryptoHash
          retention-days: 30

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows 11 (x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install PyQt5 pyinstaller watchdog

      - name: Build Windows executable
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "CryptoHash" `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import hashlib `
            --hidden-import hmac `
            --hidden-import zlib `
            hash_generator.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoHash-Windows
          path: dist\CryptoHash.exe
          retention-days: 30

  # ── macOS ────────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS (x86_64 + Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install PyQt5 pyinstaller watchdog

      - name: Build macOS binary
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "CryptoHash" \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import hashlib \
            --hidden-import hmac \
            --hidden-import zlib \
            hash_generator.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoHash-macOS
          path: dist/CryptoHash
          retention-days: 30

  # ── Release (runs only on GitHub Release events) ─────────────────────────
  release:
    name: Attach binaries to GitHub Release
    needs: [ build-linux, build-windows, build-macos ]
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries for clarity
        run: |
          mv artifacts/CryptoHash-Linux/CryptoHash      artifacts/CryptoHash-linux-x86_64
          mv artifacts/CryptoHash-Windows/CryptoHash.exe artifacts/CryptoHash-windows-x86_64.exe
          mv artifacts/CryptoHash-macOS/CryptoHash      artifacts/CryptoHash-macos

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CryptoHash-linux-x86_64
            artifacts/CryptoHash-windows-x86_64.exe
            artifacts/CryptoHash-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
